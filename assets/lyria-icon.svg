<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e1b3a"/>
      <stop offset="0.55" stop-color="#4c1d95"/>
      <stop offset="1" stop-color="#a21caf"/>
    </linearGradient>
    <linearGradient id="stroke" x1="128" y1="80" x2="384" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5f3ff"/>
      <stop offset="1" stop-color="#ddd6fe"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Rounded-square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Soft inner highlight -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="white" fill-opacity="0.04"/>

  <!-- Lyre arms: two curved prongs rising from a base -->
  <g stroke="url(#stroke)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left arm -->
    <path d="M176 352 C 144 272, 152 184, 200 120" stroke-width="18"/>
    <!-- Right arm -->
    <path d="M336 352 C 368 272, 360 184, 312 120" stroke-width="18"/>
    <!-- Crossbar -->
    <path d="M200 120 Q 256 96 312 120" stroke-width="18"/>
    <!-- Base / soundboard arc -->
    <path d="M160 360 Q 256 408 352 360" stroke-width="22"/>
  </g>

  <!-- Strings: waveform pulse instead of straight strings -->
  <g stroke="#ffffff" stroke-opacity="0.95" stroke-linecap="round" fill="none" filter="url(#glow)">
    <path d="M208 360 L 208 330 L 208 260 L 208 170" stroke-width="4"/>
    <path d="M240 360 L 240 320 L 240 210 L 240 150" stroke-width="4"/>
    <path d="M272 360 L 272 320 L 272 210 L 272 150" stroke-width="4"/>
    <path d="M304 360 L 304 330 L 304 260 L 304 170" stroke-width="4"/>
  </g>

  <!-- Waveform pulse crossing the strings (ties to the 'realtime' identity) -->
  <path
    d="M120 280
       L 170 280
       L 190 240
       L 210 320
       L 230 220
       L 250 300
       L 270 220
       L 290 300
       L 310 240
       L 330 320
       L 350 240
       L 392 280"
    stroke="#f0abfc"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
